name: Build and Deploy GitBook

on:
  push:
    branches: [ main, master ]  # работает и с main, и с master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install GitBook CLI
        run: npm install -g gitbook-cli

      - name: Prepare GitBook (если есть book.json)
        run: |
          gitbook init
          # gitbook install   # раскомментируйте, если есть book.json

      - name: Build GitBook
        run: gitbook build

      - name: Add .nojekyll to bypass Jekyll processing
        run: touch ./_book/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_book
          publish_branch: gh-pages
          force_orphan: true   # полностью заменяет ветку gh-pages
